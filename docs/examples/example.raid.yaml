# yaml-language-server: $schema=../../schemas/raid-profile.schema.json

name: raid
repositories:
  - name: raid
    path: ~/Developer/raid-test
    url: https://github.com/8bitAlex/raid.git
  - name: raid-2
    path: ~/Developer/raid-test-2
    url: https://github.com/8bitAlex/raid.git

environments:
  - name: dev
    tasks:
      - type: Shell
        cmd: echo "Hello, world! - From profile"
        shell: bash
      - type: Shell
        literal: false
        cmd: echo $NODE_ENV
      - type: Script
        path: ~/Developer/raid/docs/examples/hello.sh
        runner: bash
        concurrent: false
      - type: Shell
        cmd: touch ~/testfile.txt && echo "Created testfile.txt"
        concurrent: true
    variables:
      - name: NODE_ENV
        value: development
      - name: DATABASE_URL
        value: postgresql://localhost:5432/dev_db
      - name: API_URL
        value: https://api.example.com

install:
  tasks:
    - type: Shell
      cmd: echo "Installing dependencies..."