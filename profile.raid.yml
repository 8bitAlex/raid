# Uses local schema for development
# yaml-language-server: $schema=./schemas/raid-profile.schema.json

# Required for YAML support in VSCode
# https://marketplace.visualstudio.com/items?itemName=redhat.vscode-yaml

name: raid
repositories:
  - name: raid
    path: ~/Developer/raid
    url: https://github.com/8bitAlex/raid.git

commands:
  - name: test
    usage: Build and run all tests for the raid app and docsite
    tasks:
      - type: Print
        message: "==> Building raid app"
        color: cyan
      - type: Shell
        name: Build raid app
        cmd: go build ./...
        path: ~/Developer/raid
      - type: Print
        message: "==> Testing raid app"
        color: cyan
      - type: Shell
        name: Test raid app
        cmd: go test ./...
        path: ~/Developer/raid
      - type: Print
        message: "==> Building docsite"
        color: cyan
      - type: Shell
        name: Build docsite
        cmd: npm install && npm run build
        path: ~/Developer/raid/site
      - type: Print
        message: "==> Testing docsite"
        color: cyan
      - type: Shell
        name: Test docsite
        cmd: npm test
        path: ~/Developer/raid/site
      - type: Print
        message: "==> Type-checking docsite"
        color: cyan
      - type: Shell
        name: Type-check docsite
        cmd: npm run typecheck
        path: ~/Developer/raid/site
      - type: Print
        message: "==> Coverage report"
        color: cyan
      - type: Shell
        name: Test coverage report
        literal: true
        cmd: |-
          go test -coverpkg=./src/... -coverprofile=/tmp/raid-coverage.out ./... > /dev/null && go tool cover -func=/tmp/raid-coverage.out | awk 'END {print "Total coverage: " $NF}'
        path: ~/Developer/raid
      - type: Print
        message: "==> Tests completed"
        color: green

