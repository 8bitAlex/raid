# yaml-language-server: $schema=./schemas/raid-profile.schema.json

name: raid
repositories:
  - name: raid
    path: ~/Developer/raid
    url: https://github.com/8bitAlex/raid.git

environments:
  - name: dev
    tasks:
      - type: Shell
        cmd: |
          WORD="Hello, World!"
          export WORD
          echo $WORD
      - type: Set
        var: GREET
        value: $WORD
      - type: Shell
        cmd: echo $GREET && exit 1

commands:
  - name: test
    tasks:
      - type: Shell
        cmd: |
          WORD="Hello, World!"
          export WORD
          echo ${WORD}
          echo "This is a test command."
      - type: Set
        var: GREET
        value: $WORD
      - type: Shell
        cmd: echo $GREET