name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changed-files:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      src-changed: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            src:
              - 'src/**'

  version-check:
    needs: changed-files
    if: needs.changed-files.outputs.src-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
      - name: Fail if version tag already exists
        run: |
          VERSION=$(awk -F= '/^version=/{print $2}' src/resources/app.properties)
          TAG="v${VERSION}"
          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists as a git tag. Bump the version in src/resources/app.properties."
            exit 1
          fi
          echo "Version ${TAG} is new."

  build:
    needs: [changed-files, version-check]
    if: always() && (needs.version-check.result == 'success' || needs.version-check.result == 'skipped')
    runs-on: ${{ matrix.os }}
    strategy:
        matrix:
          os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@v6.0.2
    - name: Set up Go
      uses: actions/setup-go@v6.3.0
      with:
        go-version: '1.24.4'
    - name: Build
      run: go build -v ./...
    - name: Test
      run: go test -v ./...
