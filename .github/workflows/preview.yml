name: Preview

on:
  schedule:
    - cron: '0 0 * * *'

  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.changes.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Check for recent commits
        id: changes
        run: |
          COUNT=$(git log --since="24 hours ago" --oneline | wc -l)
          if [ "$COUNT" -gt "0" ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

  preview:
    needs: check
    if: needs.check.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Read version from app.properties
        id: version
        run: |
          VERSION=$(awk -F= '/^version=/{print $2}' src/resources/app.properties)
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: tag
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Fail if tag already exists
        if: steps.tag.outputs.exists == 'true'
        run: |
          echo "::error::Tag ${{ steps.version.outputs.tag }} already exists. Bump the version in src/resources/app.properties."
          exit 1

      - name: Create and push preview tag
        if: steps.tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - uses: actions/setup-go@v6.3.0
        with:
          go-version: "1.24.4"

      - uses: goreleaser/goreleaser-action@v7.0.0
        with:
          version: "~> v2"
          args: release --clean --config .goreleaser.preview.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}
