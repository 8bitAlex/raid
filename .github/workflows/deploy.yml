name: Deploy

on:
  workflow_dispatch:
    inputs:
      confirmed:
        description: "I have bumped the version in src/resources/app.properties"
        required: true
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Confirm version bump
        if: ${{ !inputs.confirmed }}
        run: |
          echo "::error::Deploy cancelled. Check the box to confirm the version has been bumped in src/resources/app.properties."
          exit 1

      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Read version from app.properties
        id: version
        run: |
          VERSION=$(awk -F= '/^version=/{print $2}' src/resources/app.properties)
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Check if tag exists
        id: tag
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Fail if tag already exists
        if: steps.tag.outputs.exists == 'true'
        run: |
          echo "::error::Tag ${{ steps.version.outputs.tag }} already exists. Bump the version in src/resources/app.properties."
          exit 1

      - name: Create and push tag
        if: steps.tag.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - uses: actions/setup-go@v6.3.0
        with:
          go-version: "1.24.4"

      - uses: goreleaser/goreleaser-action@v7.0.0
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TOKEN: ${{ secrets.HOMEBREW_TOKEN }}